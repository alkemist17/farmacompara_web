# ──────────────────────────────────────────────────────────────
#  FarmaCompara — Sobrescrituras de PRODUCCIÓN
#
#  Uso:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
#  Requiere el fichero .env con las variables reales (ver .env.docker.example).
# ──────────────────────────────────────────────────────────────

services:
  web:
    env_file:
      - .env.local
    build:
      target: runner           # Imagen standalone mínima
    volumes:
      # Sin montaje de código fuente; sólo el directorio de imágenes del scrapper
      - ${MEDIA_PRODUCTOS_DIR:?Falta MEDIA_PRODUCTOS_DIR en .env.local}:/media/productos:ro
    environment:
      NODE_ENV:             production
      NEXT_PUBLIC_APP_URL:  ${NEXT_PUBLIC_APP_URL:?Falta NEXT_PUBLIC_APP_URL en .env.local}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
