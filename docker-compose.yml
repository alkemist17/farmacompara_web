# ──────────────────────────────────────────────────────────────
#  FarmaCompara — Entorno de DESARROLLO
#  Uso: docker compose up [--build]
# ──────────────────────────────────────────────────────────────

services:
  web:
    env_file:
      - .env.local
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: farmacompara_web
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - ${MEDIA_PRODUCTOS_DIR:-/tmp/farmacompara_media}:/media/productos:ro
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:             development
      MEDIA_PRODUCTOS_DIR:  /media/productos
      NEXT_PUBLIC_APP_NAME: FarmaCompara
