<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En mantenimiento — MediOfertas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #1f9871;
      --primary-lt: #3db38b;
      --secondary:  #1e3a5f;
      --bg-start:   #0e1a2e;
      --bg-mid:     #1e3a5f;
      --bg-end:     #1a6b52;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-mid) 55%, var(--bg-end) 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* ─── Header ─────────────────────────────────────────────── */
    header {
      padding: 28px 36px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      user-select: none;
    }

    .logo-icon { width: 40px; height: 40px; flex-shrink: 0; object-fit: contain; }

    .logo-word {
      font-size: 1.75rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .logo-word .m { color: var(--primary-lt); }
    .logo-word .o { color: #fff; }

    /* ─── Main ───────────────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    /* Icono animado */
    .icon-wrap {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 36px;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(61, 179, 139, 0.28);
      animation: pulse 2.6s ease-out infinite;
    }
    .ring:nth-child(2) { animation-delay: 0.85s; }
    .ring:nth-child(3) { animation-delay: 1.70s; }

    @keyframes pulse {
      0%   { transform: scale(0.82); opacity: 0.9; }
      100% { transform: scale(1.65); opacity: 0;   }
    }

    .icon-bg {
      position: absolute;
      inset: 13px;
      border-radius: 50%;
      background: rgba(31, 152, 113, 0.13);
      border: 1.5px solid rgba(61, 179, 139, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-bg svg { width: 34px; height: 34px; stroke: var(--primary-lt); }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(31, 152, 113, 0.13);
      border: 1px solid rgba(61, 179, 139, 0.28);
      color: var(--primary-lt);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 30px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--primary-lt);
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1;    }
      50%       { opacity: 0.15; }
    }

    /* Título y descripción */
    h1 {
      font-size: clamp(1.7rem, 4.5vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.6);
      font-weight: 500;
      margin-bottom: 40px;
    }

    /* Divider */
    .divider {
      width: 44px; height: 3px;
      background: linear-gradient(90deg, var(--primary), transparent);
      border-radius: 2px;
      margin: 0 auto 36px;
    }

    /* Contacto / redes */
    .contact {
      font-size: 0.84rem;
      color: rgba(255,255,255,0.38);
    }
    .contact a {
      color: var(--primary-lt);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }
    .contact a:hover { color: #fff; }

    /* ─── Footer ─────────────────────────────────────────────── */
    footer {
      padding: 22px 36px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .copy { font-size: 0.76rem; color: rgba(255,255,255,0.22); }

    .foot-links { display: flex; gap: 20px; }
    .foot-links a {
      font-size: 0.76rem;
      color: rgba(255,255,255,0.28);
      text-decoration: none;
      transition: color .2s;
    }
    .foot-links a:hover { color: rgba(255,255,255,0.65); }

    @media (max-width: 480px) {
      header  { padding: 20px; }
      footer  { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <a href="https://mediofertas.co" class="logo">
      <img src="logo.png" alt="MediOfertas" class="logo-icon" />
      <span class="logo-word">
        <span class="m">Medi</span><span class="o">Ofertas</span>
      </span>
    </a>
  </header>

  <main>

    <div class="icon-wrap">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="icon-bg">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
    </div>

    <div class="badge">
      <span class="dot"></span>
      Mantenimiento en curso
    </div>

    <h1>Estamos realizando<br />una actualización.</h1>

    <p class="subtitle">Nuestros servicios volverán en unos minutos.</p>

    <div class="divider"></div>

    <p class="contact">
      Síguenos en
      <a href="https://instagram.com/mediofertas" target="_blank" rel="noopener noreferrer">Instagram</a>
      y
      <a href="https://facebook.com/mediofertas" target="_blank" rel="noopener noreferrer">Facebook</a>
      para novedades.
    </p>

  </main>

  <footer>
    <span class="copy">© <script>document.write(new Date().getFullYear())</script> MediOfertas. Todos los derechos reservados.</span>
    <nav class="foot-links">
      <a href="https://mediofertas.co/privacidad">Privacidad</a>
      <a href="https://mediofertas.co/terminos">Términos</a>
      <a href="mailto:contacto@mediofertas.co">Contacto</a>
    </nav>
  </footer>

</body>
</html>
